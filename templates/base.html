<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Administrativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background-color: #2c3e50;
      padding: 20px 0;
      position: fixed;
    }

    .sidebar h2 {
      color: white;
      text-align: center;
      padding: 10px 20px 20px;
      font-size: 15px;
      border-bottom: 1px solid #3d5166;
    }

    .sidebar a {
      display: block;
      color: #bdc3c7;
      text-decoration: none;
      padding: 14px 25px;
      font-size: 14px;
      transition: background 0.2s;
    }

    .sidebar a:hover {
      background-color: #3d5166;
      color: white;
    }

    .sidebar a.activo {
      background-color: #1abc9c;
      color: white;
    }

    /* Contenido */
    .contenido {
      margin-left: 220px;
      padding: 30px;
      width: 100%;
    }

    /* Tarjetas */
    .tarjetas {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 20px 25px;
      flex: 1;
      min-width: 150px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-left: 5px solid #1abc9c;
    }

    .tarjeta.rojo { border-left-color: #e74c3c; }
    .tarjeta.azul { border-left-color: #2980b9; }
    .tarjeta.violeta { border-left-color: #8e44ad; }
    .tarjeta.naranja { border-left-color: #e67e22; }

    .tarjeta h3 {
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }

    .tarjeta p {
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
    }

    /* Secciones */
    .seccion {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .seccion h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 18px;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 10px;
    }

    /* Formulario */
    .form-grupo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
      align-items: flex-end;
    }

    .form-grupo input, .form-grupo select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      flex: 1;
      min-width: 120px;
    }

    .form-grupo label {
      font-size: 12px;
      color: #7f8c8d;
      display: block;
      margin-bottom: 4px;
    }

    /* Botones */
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-verde { background-color: #27ae60; color: white; }
    .btn-rojo { background-color: #e74c3c; color: white; }
    .btn-azul { background-color: #2980b9; color: white; }
    .btn-naranja { background-color: #e67e22; color: white; }

    .btn:hover { opacity: 0.85; }

    /* Tabla */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background-color: #2c3e50;
      color: white;
      padding: 10px 12px;
      text-align: left;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
    }

    tr:hover { background-color: #f9f9f9; }

    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-verde { background: #d5f5e3; color: #27ae60; }
    .badge-rojo { background: #fde8e8; color: #e74c3c; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🏢 Sistema Admin</h2>
    <a href="/" class="{% if request.path == '/' %}activo{% endif %}">🏠 Panel Principal</a>
    <a href="/facturacion" class="{% if request.path == '/facturacion' %}activo{% endif %}">🧾 Facturación</a>
    <a href="/stock" class="{% if request.path == '/stock' %}activo{% endif %}">📦 Stock</a>
    <a href="/clientes" class="{% if request.path == '/clientes' %}activo{% endif %}">👥 Clientes</a>
    <a href="/cuentas" class="{% if request.path == '/cuentas' %}activo{% endif %}">💰 Cuentas</a>
  </div>

  <!-- Contenido -->
  <div class="contenido">
    {% block contenido %}{% endblock %}
  </div>

</body>
</html>
